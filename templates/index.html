<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MentorPro - Hệ thống Cố vấn Chiến lược</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chat-container">
        <header>
            <h1>AI MentorPro <span>v2.0</span></h1>
            <p style="text-align: center; opacity: 0.6; font-size: 0.85rem; margin-bottom: 20px;">
                Cố vấn công nghệ & chiến lược từ BMT
            </p>
        </header>

        <div id="chat-box" class="chat-box">
            <div class="msg ai-msg">
                Chào bạn! Tôi là MentorPro. Bạn cần tôi cố vấn về lộ trình công nghệ, review code hay chiến lược phát triển bền vững?
            </div>
        </div>

        <div id="responseContainer" style="display: none;">
            <div id="response" class="msg ai-msg"></div>
            <div style="text-align: right; margin-top: 10px;">
                <button onclick="clearResponse()" style="background: transparent; border: 1px solid var(--glass-border); color: var(--accent-cyan); padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 0.8rem;">
                    <i class="fas fa-plus"></i> Đặt câu hỏi mới
                </button>
            </div>
        </div>

        <form id="questionForm" enctype="multipart/form-data">
            <div class="input-group">
                <label for="imageUpload" class="file-label">
                    <i class="fas fa-paperclip"></i>
                </label>
                <input type="file" id="imageUpload" name="file" accept="image/*,application/pdf" style="display: none;">
                
                <input type="text" id="question" name="user_input" placeholder="Mô tả dự án hoặc dán lỗi code vào đây..." required autocomplete="off">
                
                <button type="submit">
                    <span>Gửi</span>
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </form>

        <footer>
            &copy; 2026 AI MentorPro Project. Hướng tới Công nghệ xanh & Phát triển bền vững.
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
